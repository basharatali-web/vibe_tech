<!DOCTYPE html>
<html>

<head>

  <title>AI Virtual Try-On</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>

    body {

      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
      text-align: center;
      margin: 0;
    }

    .box {

      background: white;
      padding: 20px;
      border-radius: 15px;
      max-width: 950px;
      margin: auto;
    }

    .images {

      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .card {

      background: #fafafa;
      padding: 15px;
      border-radius: 12px;
      width: 250px;
    }

    .card h3 {

      margin-top: 0;
    }

    img {

      width: 100%;
      border-radius: 10px;
      display: none;
    }

    button {

      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
    }

    pre {

      background: #111;
      color: #00ff66;
      padding: 15px;
      border-radius: 10px;
      overflow-x: auto;
      text-align: left;
      margin-top: 20px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

  </style>

</head>

<body>

  <div class="box">

    <h1>AI Virtual Try-On</h1>

    <div class="images">

      <div class="card">

        <h3>User Image</h3>

        <input
          type="file"
          id="userImg"
          accept="image/*"
        >

        <br><br>

        <img id="userPreview">

      </div>

      <div class="card">

        <h3>Cloth Image</h3>

        <input
          type="file"
          id="clothImg"
          accept="image/*"
        >

        <br><br>

        <img id="clothPreview">

      </div>

      <div class="card">

        <h3>Result</h3>

        <img id="outputImage">

      </div>

    </div>

    <button
      id="runBtn"
      onclick="run()"
    >
      Run Try-On
    </button>

    <pre id="output">
Result will show here...
    </pre>

  </div>

  <script>

    // User image preview
    document.getElementById("userImg")
      .addEventListener("change", function (e) {

        const file = e.target.files[0];

        if (file) {

          const url = URL.createObjectURL(file);

          const img =
            document.getElementById("userPreview");

          img.src = url;

          img.style.display = "block";
        }
      });

    // Cloth image preview
    document.getElementById("clothImg")
      .addEventListener("change", function (e) {

        const file = e.target.files[0];

        if (file) {

          const url = URL.createObjectURL(file);

          const img =
            document.getElementById("clothPreview");

          img.src = url;

          img.style.display = "block";
        }
      });

    async function run() {

      const button =
        document.getElementById("runBtn");

      const output =
        document.getElementById("output");

      const resultImg =
        document.getElementById("outputImage");

      const userFile =
        document.getElementById("userImg").files[0];

      const clothFile =
        document.getElementById("clothImg").files[0];

      // Validation
      if (!userFile || !clothFile) {

        output.innerText =
          "Please select both images.";

        return;
      }

      // Reset previous result
      resultImg.style.display = "none";

      const toBase64 = (file) =>
        new Promise((resolve, reject) => {

          const reader = new FileReader();

          reader.readAsDataURL(file);

          reader.onload = () => resolve(reader.result);

          reader.onerror = reject;
        });

      try {

        button.disabled = true;

        button.innerText =
          "Processing...";

        output.innerText =
          "Processing AI Try-On...";

        const userImage =
          await toBase64(userFile);

        const clothImage =
          await toBase64(clothFile);

        const controller = new AbortController();

setTimeout(() => {
  controller.abort();
}, 180000);

const response = await fetch(
  "https://idm-vton-backend-odhi.onrender.com/tryon",
  {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      userImage,
      clothImage
    }),
    signal: controller.signal
  }
);

output.innerText = "Response received...";

const data = await response.json();

output.innerText =
  JSON.stringify(data, null, 2);

if (data.success) {

  resultImg.src = data.result.mergedImage;

  resultImg.style.display = "block";

  output.innerText = "Image generated successfully";

} else {

  output.innerText =
    JSON.stringify(data, null, 2);

}
} else {

  output.innerText =
    JSON.stringify(data, null, 2);
}

      } catch (error) {

        output.innerText =
          "Error: " + error.message;

      } finally {

        button.disabled = false;

        button.innerText =
          "Run Try-On";
      }
    }

  </script>

</body>

</html>
