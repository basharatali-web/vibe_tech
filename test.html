<!DOCTYPE html>
<html>

<head>
  <title>AI Try-On Test</title>
</head>

<body>

  <h2>AI Try-On Test Page</h2>

  <p>User Image</p>

  <input
    type="file"
    id="userImg"
    accept="image/*"
  >

  <br><br>

  <img
    id="userPreview"
    style="max-width:200px;border-radius:10px;display:none;"
  >

  <br><br>

  <p>Cloth Image</p>

  <input
    type="file"
    id="clothImg"
    accept="image/*"
  >

  <br><br>

  <img
    id="clothPreview"
    style="max-width:200px;border-radius:10px;display:none;"
  >

  <br><br>

  <button id="runBtn" onclick="run()">
    Run Try-On
  </button>

  <br><br>

  <pre id="output">
Result will show here...
  </pre>

  <br>

  <img
    id="outputImage"
    style="max-width:300px;border-radius:10px;display:none;"
  >

  <script>

    // User preview
    document.getElementById("userImg")
      .addEventListener("change", function (e) {

        const file = e.target.files[0];

        if (file) {

          const url = URL.createObjectURL(file);

          const img =
            document.getElementById("userPreview");

          img.src = url;

          img.style.display = "block";
        }
      });

    // Cloth preview
    document.getElementById("clothImg")
      .addEventListener("change", function (e) {

        const file = e.target.files[0];

        if (file) {

          const url = URL.createObjectURL(file);

          const img =
            document.getElementById("clothPreview");

          img.src = url;

          img.style.display = "block";
        }
      });

    async function run() {

      const button =
        document.getElementById("runBtn");

      const output =
        document.getElementById("output");

      const userFile =
        document.getElementById("userImg").files[0];

      const clothFile =
        document.getElementById("clothImg").files[0];

      // Safety check
      if (!userFile || !clothFile) {

        output.innerText =
          "Please select both images.";

        return;
      }

      const toBase64 = (file) =>
        new Promise((resolve, reject) => {

          const reader = new FileReader();

          reader.readAsDataURL(file);

          reader.onload = () => resolve(reader.result);

          reader.onerror = reject;
        });

      try {

        button.disabled = true;

        output.innerText =
          "Processing AI Try-On...";

        const userImage =
          await toBase64(userFile);

        const clothImage =
          await toBase64(clothFile);

        const response = await fetch(
          "https://real-tryon-api.onrender.com/tryon",
          {
            method: "POST",

            headers: {
              "Content-Type": "application/json"
            },

            body: JSON.stringify({
              userImage,
              clothImage
            })
          }
        );

        const data = await response.json();

        output.innerText =
          JSON.stringify(data, null, 2);

        // Show output preview
        if (data.success) {

          const img =
            document.getElementById("outputImage");

          img.src = userImage;

          img.style.display = "block";
        }

      } catch (error) {

        output.innerText =
          "Error: " + error.message;

      } finally {

        button.disabled = false;
      }
    }

  </script>

</body>

</html>
