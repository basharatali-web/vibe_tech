<!DOCTYPE html>
<html>
<head>
  <title>AI Try-On Test</title>
</head>
<body>

<h2>AI Try-On Test Page</h2>

<p>User Image:</p>
<input type="file" id="userImg" accept="image/*">

<p>Cloth Image:</p>
<input type="file" id="clothImg" accept="image/*">

<br><br>

<button onclick="runTryOn()">Run Try-On</button>

<h3>Result:</h3>
<pre id="output">Waiting...</pre>

<script>
function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
  });
}

async function runTryOn() {
  const userFile = document.getElementById('userImg').files[0];
  const clothFile = document.getElementById('clothImg').files[0];

  if (!userFile || !clothFile) {
    alert("Both images required");
    return;
  }

  const userImage = await toBase64(userFile);
  const clothImage = await toBase64(clothFile);

  document.getElementById("output").innerText = "Processing...";

  const res = await fetch("https://real-tryon-api.onrender.com/tryon", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      userImage,
      clothImage
    })
  });

  const data = await res.json();

  document.getElementById("output").innerText =
    JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
